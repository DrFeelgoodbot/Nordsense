services:
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "8883:8883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  influxdb:
    image: influxdb:2.7
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: changeme123
      DOCKER_INFLUXDB_INIT_ORG: hvac
      DOCKER_INFLUXDB_INIT_BUCKET: hvac_data
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: hvac-super-secret-token
    volumes:
      - influxdb_data:/var/lib/influxdb2

  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: changeme
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/hvac.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - influxdb

  api:
    build: ./api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: hvac-super-secret-token
      INFLUX_ORG: hvac
      INFLUX_BUCKET: hvac_data
      MQTT_BROKER: mosquitto
      MQTT_PORT: "1883"
      MQTT_USERNAME: hvac
      MQTT_PASSWORD: changeme
    depends_on:
      - influxdb
      - mosquitto

volumes:
  mosquitto_data:
  mosquitto_log:
  influxdb_data:
  grafana_data:
