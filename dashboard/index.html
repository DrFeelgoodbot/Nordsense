<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NordSense — Intelligent energistyring</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph / Social sharing -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://nordsense.no" />
    <meta property="og:title"       content="NordSense — Intelligent energioptimalisering" />
    <meta property="og:description" content="Kutt strømkostnadene med automatisk styring av varmepumper og kjøleanlegg basert på Nord Pool-priser. Se live demo." />
    <meta property="og:image"       content="https://nordsense.no/og-image.svg" />
    <meta property="og:locale"      content="nb_NO" />

    <!-- Twitter / X card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="NordSense — Intelligent energioptimalisering" />
    <meta name="twitter:description" content="Kutt strømkostnadene med automatisk styring av varmepumper og kjøleanlegg basert på Nord Pool-priser." />
    <meta name="twitter:image"       content="https://nordsense.no/og-image.svg" />

    <!-- SEO -->
    <meta name="description" content="NordSense optimaliserer energikostnadene dine ved å styre varmepumper og kjøleanlegg basert på Nord Pool strømpriser. Kontakt for tilbud." />
    <meta name="keywords"    content="energioptimalisering, varmepumpe, kjøleanlegg, ventilasjon, klimaanlegg, Nord Pool, strømpris, energistyring, kuldetekniker" />
  </head>
  <body class="bg-slate-50">
    <!-- Netlify Forms detection -->
    <form name="kontakt" netlify netlify-honeypot="bot-field" hidden>
      <input name="name" /><input name="company" /><input name="phone" />
      <input name="email" /><input name="buildings" /><textarea name="message"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
