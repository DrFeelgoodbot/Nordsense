<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e40af" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grad)"/>

  <!-- Logo icon -->
  <rect x="80" y="80" width="72" height="72" rx="18" fill="#2563eb"/>
  <polygon points="116,98 104,126 113,126 100,158 128,120 117,120 130,98" fill="white"/>

  <!-- Brand name -->
  <text x="172" y="120" font-size="42" font-weight="700" fill="white">NordSense</text>
  <text x="174" y="148" font-size="16" font-weight="400" fill="#94a3b8" letter-spacing="3">ENERGIOPTIMALISERING</text>

  <!-- Headline -->
  <text x="80" y="290" font-size="64" font-weight="700" fill="white">Kutt strømkostnadene</text>
  <text x="80" y="365" font-size="64" font-weight="700" fill="#60a5fa">automatisk.</text>

  <!-- Subtext -->
  <text x="80" y="430" font-size="26" fill="#94a3b8">Styrer varmepumper og kjøleanlegg basert på</text>
  <text x="80" y="465" font-size="26" fill="#94a3b8">Nord Pool strømpriser — i sanntid.</text>

  <!-- Stats -->
  <rect x="80" y="520" width="200" height="80" rx="12" fill="#1e293b"/>
  <text x="180" y="553" text-anchor="middle" font-size="32" font-weight="700" fill="#34d399">15–25%</text>
  <text x="180" y="580" text-anchor="middle" font-size="14" fill="#64748b">Energibesparelse</text>

  <rect x="300" y="520" width="200" height="80" rx="12" fill="#1e293b"/>
  <text x="400" y="553" text-anchor="middle" font-size="32" font-weight="700" fill="#60a5fa">NO1–5</text>
  <text x="400" y="580" text-anchor="middle" font-size="14" fill="#64748b">Nord Pool-soner</text>

  <rect x="520" y="520" width="200" height="80" rx="12" fill="#1e293b"/>
  <text x="620" y="553" text-anchor="middle" font-size="32" font-weight="700" fill="#f59e0b">RS485</text>
  <text x="620" y="580" text-anchor="middle" font-size="14" fill="#64748b">Modbus + CAN</text>

  <!-- URL -->
  <text x="1120" y="580" text-anchor="end" font-size="20" fill="#475569">nordsense.no</text>
</svg>
